name: CI/CD Pipeline for Product Service

on:
  push:
    branches: [ "dev_yji" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ github.event.repository.name }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Checkout Manifest Repository
        uses: actions/checkout@v4
        with:
          repository: Salijang/sallijang-manifest
          token: ${{ secrets.GHA_TOKEN }}
          path: manifest

      - name: Setup Kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Update Kubernetes resources
        run: |
          cd manifest/base/product
          REAL_IMAGE_URL="${{ steps.login-ecr.outputs.registry }}/${{ github.event.repository.name }}"
          kustomize edit set image product-image=$REAL_IMAGE_URL:${{ github.sha }}
          cat kustomization.yaml
          git config --global user.email "github-actions@github.com"
          git config --global user.name "github-actions"
          git add kustomization.yaml
          git diff --cached --quiet || git commit -m "chore(product): update image tag to ${{ github.sha }} [skip ci]"
          git push origin main